    <h3><strong>Entre em contato</strong></h3>

    <form action="" method="">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="text" id="email" name="email" placeholder="exemplo@email.com" required>
        </div>

        <div class="form-group">
            <label for="assunto">Assunto:</label>
            <textarea id="assunto" name="assunto" rows="3" placeholder="Digite aqui o conteúdo do assunto."></textarea>
        </div>

        <button type="submit">Enviar</button>
    </form>
